<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Different Hiragana</title>
<style>
body {font-family: Arial; text-align:center; margin:0; padding:10px; background:#f9f9f9;}
.board {display:grid; grid-template-columns:repeat(6,1fr); gap:6px; width:90vw; max-width:360px; margin:10px auto;}
.cell {border:1px solid #ccc; aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer;}
.correct {background:#a5f3a5;}
.wrong {background:#f3a5a5;}
button {padding:8px 12px; margin:5px;}
.info {font-size:14px;}
</style>
</head>
<body>

<h2>Find the Different Hiragana</h2>

<div class="info">Level: <span id="levelLabel">Easy</span></div>
<div class="info">⏱ <span id="time">0.0</span> sec</div>
<div class="info">🔥 Streak: <span id="streak">0</span></div>

<button onclick="newGame()">Start / Next</button>

<div id="board" class="board"></div>
<div id="message"></div>

<script>
const pairs = [
  ["る","ろ"], ["は","ほ"], ["ぬ","め"], ["あ","お"],
  ["さ","き"], ["ち","さ"], ["ね","わ"], ["つ","う"]
];

let startTime = 0;
let timer;
let streak = 0;
let level = 1;

function getLevelName(){
  if(level===1) return "Easy";
  if(level===2) return "Medium";
  return "Hard";
}

function getDiffCount(){
  if(level===1) return 1;
  if(level===2) return 3;
  return 5;
}

function startTimer(){
  startTime = Date.now();
  clearInterval(timer);
  timer = setInterval(()=>{
    let t = (Date.now()-startTime)/1000;
    document.getElementById("time").textContent = t.toFixed(1);
  },100);
}

function newGame(){
  const board = document.getElementById("board");
  const msg = document.getElementById("message");
  board.innerHTML="";
  msg.textContent="";
  document.getElementById("levelLabel").textContent = getLevelName();

  const pair = pairs[Math.floor(Math.random()*pairs.length)];
  const main = pair[0];
  const diff = pair[1];

  let answers = [];
  let count = getDiffCount();

  while(answers.length < count){
    let idx = Math.floor(Math.random()*36);
    if(!answers.includes(idx)) answers.push(idx);
  }

  for(let i=0;i<36;i++){
    const div = document.createElement("div");
    div.className="cell";
    div.textContent = answers.includes(i)? diff : main;

    div.onclick=()=>{
      if(answers.includes(i)){
        div.classList.add("correct");

        let allFound = [...document.querySelectorAll(".cell")].filter((c,idx)=>answers.includes(idx)).every(c=>c.classList.contains("correct"));

        if(allFound){
          msg.textContent="Correct!";
          streak++;
          document.getElementById("streak").textContent=streak;
          clearInterval(timer);

          // level up every 3 correct
          if(streak % 3 === 0 && level < 3){
            level++;
          }

        }
      }else{
        div.classList.add("wrong");
        msg.textContent="Try again";
        streak=0;
        level=1;
        document.getElementById("streak").textContent=streak;
      }
    };

    board.appendChild(div);
  }

  startTimer();
}

newGame();
</script>

</body>
</html>
